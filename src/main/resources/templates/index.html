<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Chat Application</title>
    <link rel="stylesheet" href="/Chat.css">

</head>
<body>

<div id="chat"></div>
<textarea id="message" placeholder="Type your message here..." onkeypress="handleKeyPress(event)"
       style="resize: both;"></textarea>
<button onclick="sendMessage()">Send</button>
<button onclick="createUsername()">Change Username!</button>
<!--this button id is needed for toggling the label when
we switch between dark mode and light mode.
//it gives this button a speicfc name so we can easily find
it and change the label when we switch between dark mode and light mode.
//if we dont do this it will js attach it self to
the first button on this html page which is the send
button and it will change the label of the send button instead of the dark mode button.-->
<button id="darkModeBtn" onclick="toggleDarkMode()">dark mode</button>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    var stompClient = null;
    var currentUsername = null;

    function createUsername() {
        var username = prompt("Please enter your username:");
        if (!username) {
            alert("Username cannot be empty. Please try again.");
            return createUsername();
        }
        currentUsername = username;
        return username;
    }

    function connect() {
        createUsername();//we put it here so it will ask for username before connecting to the server.
        var socket = new SockJS('/chat-websocket');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            console.log('Connected: ' + frame);
            stompClient.subscribe('/topic/messages', function (messageOutput) {
                showMessage(JSON.parse(messageOutput.body));
            });
        }, function (error) {
            console.error('Connection error: ' + error);
            alert('Failed to connect to server.');
        });
    }

    function sendMessage() {
        if (!stompClient || !stompClient.connected) {
            alert("Not connected to the server. Please wait and try again.");
            return;
        }

        var text = document.getElementById('message').value;
        stompClient.send("/app/message", {}, JSON.stringify({'from': currentUsername, 'content': text}));
        document.getElementById('message').value = '';
    }

    function showMessage(message) {
        var chat = document.getElementById('chat');
        var messageElement = document.createElement('div');
        messageElement.appendChild(document.createTextNode(message.from + ": " + message.content));
        chat.appendChild(messageElement);
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function toggleDarkMode() {
        var element = document.body;
        var chat = document.getElementById('chat');
        element.classList.toggle("dark-mode");
        chat.classList.toggle("dark-mode2");
        toggleLabel();
    }

    function toggleLabel() {
        const button = document.getElementById('darkModeBtn');
        if (button.innerText === 'dark mode') {
            button.innerText = 'light mode';
        } else {
            button.innerText = 'dark mode';
        }
    }

    connect();

</script>
</body>
</html>
